<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gdoc | Global Digital Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p-blue: #3b82f6; --p-purple: #a855f7; --p-dark: #020617; }
        body { background: var(--p-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .hidden { display: none; }
        .tech-input { background: #0f172a; border: 1px solid #1e293b; color: white; border-radius: 12px; padding: 12px; font-size: 14px; width: 100%; transition: 0.3s; }
        .tech-input:focus { border-color: var(--p-blue); outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .nav-btn { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #64748b; transition: 0.3s; }
        .nav-btn:hover, .nav-active { color: var(--p-blue); }
        .ai-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-card sticky top-0 z-50 rounded-none border-b border-slate-800 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black">G</div>
            <h1 class="text-xl font-black tracking-tighter italic">GDOC</h1>
        </div>
        <div class="flex gap-6">
            <button onclick="nav('auth')" id="link-auth" class="nav-btn nav-active">Register</button>
            <button onclick="nav('patient')" id="link-patient" class="nav-btn hidden">Patient Panel</button>
            <button onclick="nav('master')" id="link-master" class="nav-btn">Master Admin</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <div id="view-auth" class="max-w-xl mx-auto space-y-8 mt-10">
            <div class="glass-card p-8 border-t-4 border-blue-600">
                <h2 class="text-2xl font-black text-center mb-6">Patient <span class="text-blue-500">Registration</span></h2>
                <form onsubmit="handleAuth(event)" class="space-y-4">
                    <select id="reg-hosp" class="tech-input" required>
                        <option value="" disabled selected>Choose Your Hospital Provider</option>
                        <option value="HOSP-001">Nairobi National Hospital</option>
                        <option value="HOSP-002">Mombasa Specialist Center</option>
                        <option value="HOSP-003">Kisumu Digital Clinic</option>
                    </select>
                    <input type="text" id="reg-name" placeholder="Full Name" class="tech-input" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="reg-blood" placeholder="Blood Group (O+)" class="tech-input">
                        <input type="number" id="reg-age" placeholder="Age" class="tech-input">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 shadow-lg shadow-blue-500/20">Initialize Health Record</button>
                </form>
            </div>
        </div>

        <div id="view-patient" class="hidden space-y-6">
            <div class="flex justify-between items-end border-b border-slate-800 pb-6 mb-6">
                <div>
                    <p class="text-[10px] text-blue-500 font-black uppercase">Central Health Record</p>
                    <h2 id="p-name" class="text-3xl font-black">---</h2>
                </div>
                <div class="text-right">
                    <p id="p-hosp" class="text-xs text-slate-500 font-bold uppercase"></p>
                    <span class="text-[10px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded">Status: Synced</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card p-6 border-l-4 border-blue-500">
                    <h3 class="font-bold mb-4 uppercase text-xs tracking-widest text-slate-400">Update Medical History</h3>
                    <textarea id="h-note" rows="4" placeholder="Add new medical history notes, allergies, or surgery logs..." class="tech-input mb-4 h-32"></textarea>
                    <button onclick="saveHistory()" class="bg-blue-600 px-6 py-2 rounded-lg text-[10px] font-black uppercase">Save History</button>
                </div>
                <div class="glass-card p-6">
                    <h3 class="font-bold mb-4 uppercase text-xs tracking-widest text-slate-400">Your Archive</h3>
                    <div id="h-list" class="space-y-4 max-h-60 overflow-y-auto pr-2 text-sm text-slate-300">
                        <p class="italic text-slate-600">No medical history entries found.</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-master" class="hidden space-y-8">
            <header class="flex justify-between items-center">
                <h2 class="text-3xl font-black italic">MASTER <span class="text-blue-500">CONTROL</span></h2>
                <span class="text-[10px] bg-purple-900/30 text-purple-400 px-3 py-1 rounded-full font-bold">SUPER ADMIN ACCESS</span>
            </header>

            <div id="master-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

            <div id="master-hosp-details" class="hidden glass-card p-8 border-t-4 border-purple-500">
                <div class="flex justify-between items-center mb-8">
                    <h3 id="target-hosp-name" class="text-xl font-black text-purple-400 uppercase">---</h3>
                    <button onclick="closeMasterView()" class="text-xs text-slate-500 hover:text-white"><i class="fas fa-times mr-2"></i>Back to Control</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-500 uppercase text-[10px] border-b border-slate-800">
                            <tr><th class="pb-4">Patient Name</th><th class="pb-4">Vitals</th><th class="pb-4">Last Medical Note</th></tr>
                        </thead>
                        <tbody id="master-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-6 right-6 z-50">
        <div id="ai-chat" class="hidden absolute bottom-20 right-0 w-80 glass-card p-4 shadow-2xl border-blue-500/50 flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Gdoc Triage AI</span>
                <i class="fas fa-robot text-blue-500"></i>
            </div>
            <div id="ai-messages" class="h-48 overflow-y-auto mb-4 text-[11px] space-y-3 pr-2"></div>
            <div class="flex gap-2">
                <input type="text" id="ai-input" placeholder="Describe symptoms..." class="flex-1 bg-slate-900 p-2 rounded-lg text-xs border border-slate-800 outline-none focus:border-blue-500">
                <button onclick="askAI()" class="bg-blue-600 px-3 rounded-lg"><i id="ai-icon" class="fas fa-paper-plane text-xs"></i></button>
            </div>
        </div>
        <button onclick="document.getElementById('ai-chat').classList.toggle('hidden')" class="ai-pulse w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/40">
            <i class="fas fa-brain text-white text-xl"></i>
        </button>
    </div>

    <script>
        // MASTER STATE (SIMULATED DB)
        let APP_DATA = {
            hospitals: [
                { id: 'HOSP-001', name: 'Nairobi National Hospital', loc: 'Nairobi' },
                { id: 'HOSP-002', name: 'Mombasa Specialist Center', loc: 'Mombasa' },
                { id: 'HOSP-003', name: 'Kisumu Digital Clinic', loc: 'Kisumu' }
            ],
            patients: [],
            currentUser: null
        };

        // NAVIGATION LOGIC
        function nav(view) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('view-' + view).classList.remove('hidden');
            
            // UI Feedback for Nav Buttons
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('link-' + view).classList.add('nav-active');

            if(view === 'master') renderMasterGrid();
        }

        // AUTH / REGISTRATION
        function handleAuth(e) {
            e.preventDefault();
            const patient = {
                name: document.getElementById('reg-name').value,
                hospId: document.getElementById('reg-hosp').value,
                blood: document.getElementById('reg-blood').value || 'N/A',
                age: document.getElementById('reg-age').value || 'N/A',
                history: []
            };
            APP_DATA.patients.push(patient);
            APP_DATA.currentUser = patient;

            // Update UI
            document.getElementById('p-name').innerText = patient.name;
            document.getElementById('p-hosp').innerText = "Facility: " + patient.hospId;
            document.getElementById('link-patient').classList.remove('hidden');
            nav('patient');
        }

        // MEDICAL HISTORY ARCHIVE LOGIC
        function saveHistory() {
            const note = document.getElementById('h-note').value;
            if(!note) return;
            const entry = { timestamp: new Date().toLocaleString(), text: note };
            APP_DATA.currentUser.history.unshift(entry);
            document.getElementById('h-note').value = "";
            renderPatientHistory();
            alert("Entry saved to your central health record archive.");
        }

        function renderPatientHistory() {
            const list = document.getElementById('h-list');
            list.innerHTML = APP_DATA.currentUser.history.map(h => `
                <div class="border-l-2 border-blue-500 pl-4 py-1">
                    <p class="text-[9px] text-blue-500 font-bold">${h.timestamp}</p>
                    <p class="text-slate-300">${h.text}</p>
                </div>
            `).join('');
        }

        // MASTER ADMIN: RENDER HOSPITAL DIRECTORY
        function renderMasterGrid() {
            const grid = document.getElementById('master-grid');
            grid.innerHTML = APP_DATA.hospitals.map(h => `
                <div onclick="viewHospPatients('${h.id}', '${h.name}')" class="glass-card p-6 cursor-pointer hover:border-blue-500 group transition-all">
                    <h4 class="font-black text-lg group-hover:text-blue-400">${h.name}</h4>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">${h.loc}, Kenya</p>
                    <div class="mt-4 flex justify-between items-center text-[10px] font-bold text-slate-600">
                        <span>ID: ${h.id}</span>
                        <i class="fas fa-chevron-right group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            `).join('');
            grid.classList.remove('hidden');
            document.getElementById('master-hosp-details').classList.add('hidden');
        }

        // MASTER ADMIN: VIEW ISOLATED FACILITY DATA
        function viewHospPatients(id, name) {
            document.getElementById('master-grid').classList.add('hidden');
            const details = document.getElementById('master-hosp-details');
            const table = document.getElementById('master-table-body');
            document.getElementById('target-hosp-name').innerText = name;

            // ISOLATION: Filter by HospId
            const filtered = APP_DATA.patients.filter(p => p.hospId === id);
            
            table.innerHTML = filtered.length > 0 ? filtered.map(p => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/20">
                    <td class="py-4 font-black text-blue-400 text-sm">${p.name}</td>
                    <td class="py-4 text-xs text-slate-400 font-mono">${p.blood} / Age: ${p.age}</td>
                    <td class="py-4 text-[10px] text-slate-500 italic">
                        ${p.history.length > 0 ? p.history[0].text.substring(0, 40) + '...' : 'No history yet'}
                    </td>
                </tr>
            `).join('') : `<tr><td colspan="3" class="py-12 text-center text-slate-700 italic">No records found for this facility.</td></tr>`;

            details.classList.remove('hidden');
        }

        function closeMasterView() {
            document.getElementById('master-hosp-details').classList.add('hidden');
            document.getElementById('master-grid').classList.remove('hidden');
        }

        // AI MEDICAL TRIAGE (GIFTEDTECH API)
        async function askAI() {
            const input = document.getElementById('ai-input');
            const box = document.getElementById('ai-messages');
            const icon = document.getElementById('ai-icon');
            const q = input.value;
            if(!q) return;

            input.value = "";
            icon.className = "fas fa-spinner animate-spin";
            box.innerHTML += `<div class="text-right ml-8"><p class="bg-slate-800 p-2 rounded-lg inline-block text-slate-300">You: ${q}</p></div>`;

            try {
                // Calling GiftedTech API
                const res = await fetch(`https://api.giftedtech.co.ke/api/ai/gpt4o?apikey=gifted&q=${encodeURIComponent(q)}`);
                const data = await res.json();
                box.innerHTML += `
                    <div class="mr-8 flex gap-2">
                        <div class="w-4 h-4 bg-blue-600 rounded-full flex-shrink-0 flex items-center justify-center text-[8px] font-black">AI</div>
                        <p class="bg-blue-900/40 p-2 rounded-lg border border-blue-500/20 text-slate-200 shadow-lg">${data.result}</p>
                    </div>`;
            } catch (err) {
                box.innerHTML += `<p class="text-red-500 text-[9px]">Communication failure with AI core.</p>`;
            }
            icon.className = "fas fa-paper-plane";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
